# =============================================================
# CẤU HÌNH CƠ BẢN DỰ ÁN STORE - ĐONG ĐƯA
# =============================================================
spring.application.name=store

# Ưu tiên cổng PORT do Render cấp phát, mặc định là 8080 nếu chạy local
server.port=${PORT:8080}

# =============================================================
# VÔ HIỆU HÓA DATABASE (Để tránh lỗi khi chưa có DB trên Render)
# =============================================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
                             org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# =============================================================
# CẤU HÌNH THYMELEAF (Xử lý dứt điểm lỗi path và hiển thị)
# =============================================================
# Ép Spring Boot tìm template trong classpath (trong file JAR) thay vì đường dẫn tuyệt đối của máy tính
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Cấu hình xử lý lỗi Whitelabel chi tiết hơn để dễ debug (nếu có)
server.error.include-message=always
server.error.path=/error

# =============================================================
# CẤU HÌNH TÀI NGUYÊN TĨNH (CSS, JS, Images cho quán)
# =============================================================
spring.mvc.static-path-pattern=/static/**